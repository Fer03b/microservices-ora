syntax = "proto3";

package boutique;

// Service gRPC exposé par product-service pour les autres microservices.
// Utilisé par order-service pour vérifier stock et prix avant commande.
service ProductService {
  rpc GetProduct (GetProductRequest) returns (Product);
  rpc CheckAvailability (CheckAvailabilityRequest) returns (AvailabilityResponse);
}

message GetProductRequest {
  int32 id = 1;
}

message Product {
  int32 id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
  string description = 5;
}

message CheckAvailabilityRequest {
  repeated OrderLine lines = 1;
}

message OrderLine {
  int32 product_id = 1;
  int32 quantity = 2;
}

message AvailabilityResponse {
  bool available = 1;
  double total_price = 2;
  repeated ResolvedLine resolved_lines = 3;
  string error = 4;
}

message ResolvedLine {
  int32 product_id = 1;
  string name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  double line_total = 5;
}
