apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      serviceAccountName: product-service-sa
      containers:
        - name: product-service
          image: TON_USER_DOCKERHUB/product-service:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
            - name: grpc
              containerPort: 50051
          env:
            - name: PORT
              value: "3000"
            - name: GRPC_PORT
              value: "50051"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
