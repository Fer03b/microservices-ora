# Service ClusterIP : Postgres accessible UNIQUEMENT depuis l'intérieur du cluster
# (pas exposé à Internet). Résolu par DNS sous le nom "postgres".
# data-service s'y connecte via PGHOST=postgres.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
