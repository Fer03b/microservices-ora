# Déploiement PostgreSQL
# - 1 seul replica (pas de réplication, suffisant pour le projet école)
# - Volume persistant monté sur /var/lib/postgresql/data
# - Credentials depuis le Secret postgres-credentials
#
# ⚠️ On utilise Deployment (pas StatefulSet) pour rester simple sur minikube.
# En prod, un StatefulSet serait plus propre (identité stable, ordre de démarrage).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate     # évite 2 pods qui se disputent le volume pendant un rolling update
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres-sa
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            # Astuce : Postgres refuse de créer PGDATA dans un dossier non vide.
            # Le volume lost+found sur certains systèmes casse l'init → sous-dossier.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "boutique_user", "-d", "boutiquedb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "boutique_user", "-d", "boutiquedb"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data
