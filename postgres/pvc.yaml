# PersistentVolumeClaim : Kubernetes alloue 1Gi de stockage persistant
# qui survit aux redémarrages du pod (données conservées).
# Sur minikube, la StorageClass par défaut est "standard".

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
