# ServiceAccounts : chaque microservice a sa propre identité Kubernetes.
# Istio utilise ces SA pour générer les certificats mTLS et les règles RBAC.
# C'est la base du principe "zero trust" : on identifie l'appelant, on ne se
# contente pas de son adresse IP (qui peut être usurpée).
#
# Par défaut, un pod utilise le SA "default" du namespace. On préfère avoir des
# SA dédiés pour pouvoir dire "SEUL auth-service peut appeler data-service".

apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-service-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: default
