syntax = "proto3";

package boutique.data;

// ============================================================
// DATA-SERVICE — accès centralisé à PostgreSQL
// Exposé UNIQUEMENT en interne (pas de REST public).
// Appelé par auth-service et order-service.
// ============================================================

// --- Users ---
service UserRepository {
  rpc CreateUser        (CreateUserRequest)    returns (UserWithHash);
  rpc FindUserByEmail   (FindByEmailRequest)   returns (UserWithHash);
  rpc FindUserById      (FindByIdRequest)      returns (User);
}

// --- Orders ---
service OrderRepository {
  rpc CreateOrder       (CreateOrderRequest)   returns (Order);
  rpc FindOrdersByUser  (FindByUserRequest)    returns (OrderList);
  rpc FindOrderByIdForUser (FindOrderByIdForUserRequest) returns (Order);
}

// ============================================================
// Messages — Users
// ============================================================

message User {
  int32  id = 1;
  string email = 2;
  string name = 3;
}

message UserWithHash {
  int32  id = 1;
  string email = 2;
  string name = 3;
  string password_hash = 4;
}

message CreateUserRequest {
  string email = 1;
  string name = 2;
  string password_hash = 3;
}

message FindByEmailRequest {
  string email = 1;
}

message FindByIdRequest {
  int32 id = 1;
}

// ============================================================
// Messages — Orders
// ============================================================

message OrderItem {
  int32  product_id = 1;
  string name = 2;
  int32  quantity = 3;
  double unit_price = 4;
  double line_total = 5;
}

message Order {
  int32  id = 1;
  int32  user_id = 2;
  double total = 3;
  string status = 4;
  string created_at = 5;
  repeated OrderItem items = 6;
}

message OrderList {
  repeated Order orders = 1;
}

message CreateOrderRequest {
  int32  user_id = 1;
  double total = 2;
  repeated OrderItem items = 3;
}

message FindByUserRequest {
  int32 user_id = 1;
}

message FindOrderByIdForUserRequest {
  int32 id = 1;
  int32 user_id = 2;
}
