server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Routes SPA (React Router) : tout chemin inconnu côté front renvoie index.html
  # ⚠️ Sauf /api/* : ce chemin N'ARRIVE PAS jusqu'ici en mode Istio —
  # la gateway Istio route /api/* directement vers les microservices.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressif sur les assets hashés par Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
